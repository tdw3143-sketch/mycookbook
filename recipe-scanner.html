<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recipe Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #FAF7F2;
      color: #2C1810;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }
    h1 { font-size: 1.6rem; margin-bottom: 8px; }
    p.sub { color: #8B7355; margin-bottom: 28px; font-size: 0.95rem; text-align: center; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #D4C4B0;
      border-radius: 8px;
      font-size: 0.95rem;
      background: #FAF7F2;
    }
    .photo-area {
      border: 2px dashed #C4622D;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s;
      margin: 16px 0;
    }
    .photo-area:hover { background: #FFF3EE; }
    .photo-area input { display: none; }
    .photo-area .icon { font-size: 2.5rem; margin-bottom: 8px; }
    .photo-area p { color: #8B7355; font-size: 0.9rem; }
    #preview-img { width: 100%; border-radius: 8px; margin-top: 12px; display: none; }
    button.scan-btn {
      width: 100%;
      background: #C4622D;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button.scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { text-align: center; color: #8B7355; margin: 12px 0; font-size: 0.9rem; min-height: 20px; }
    .error { color: #c0392b; font-size: 0.9rem; margin-top: 8px; }

    /* Results */
    #result { display: none; }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .result-header h2 { font-size: 1.05rem; font-weight: 700; color: #C4622D; }
    .copy-btn {
      background: #F5EDE4;
      color: #C4622D;
      border: 1px solid #D4A984;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }
    .copy-btn:active { background: #E8D5C4; }
    .result-section { margin-bottom: 24px; }
    .result-section:last-child { margin-bottom: 0; }
    .meta { font-size: 0.85rem; color: #8B7355; margin-bottom: 10px; }
    .result-section ul { list-style: none; padding: 0; }
    .result-section ol { padding-left: 20px; }
    .result-section li {
      padding: 7px 0;
      border-bottom: 1px solid #F0E8DD;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .result-section ul li::before { content: "• "; color: #C4622D; font-weight: bold; }
    .result-section li:last-child { border-bottom: none; }
    .skipped {
      font-size: 0.82rem;
      color: #A0856B;
      margin-top: 8px;
      font-style: italic;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #2C1810;
      color: #fff;
      padding: 10px 22px;
      border-radius: 20px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>📷 Recipe Scanner</h1>
  <p class="sub">Photograph a recipe book page — get the shopping list &amp; instructions instantly.</p>

  <div class="card">
    <label for="api-key">Anthropic API Key</label>
    <input type="password" id="api-key" placeholder="sk-ant-api03-…">
    <p style="font-size:0.8rem;color:#8B7355;margin-top:6px">Stored in your browser only, never shared.</p>
  </div>

  <div class="card">
    <label>Photo of recipe (book page, magazine, screen…)</label>
    <div class="photo-area" onclick="document.getElementById('file-input').click()">
      <div class="icon">📷</div>
      <p>Tap to take a photo or choose from library</p>
      <input type="file" id="file-input" accept="image/*">
    </div>
    <img id="preview-img" alt="Preview">
    <button class="scan-btn" id="scan-btn" disabled>📖 Scan Recipe</button>
    <div id="status"></div>
    <div class="error" id="error-msg"></div>
  </div>

  <div class="card" id="result">
    <div class="result-section">
      <div class="result-header">
        <h2>🛒 Ingredients to buy</h2>
        <button class="copy-btn" id="copy-btn">📋 Copy list</button>
      </div>
      <div class="meta" id="servings-meta"></div>
      <ul id="ingredients-list"></ul>
      <div class="skipped" id="skipped-msg"></div>
    </div>
    <div class="result-section">
      <h2>👨‍🍳 Instructions</h2>
      <ol id="instructions-list"></ol>
    </div>
    <button class="scan-btn" id="save-btn" style="background:#5C8B3A;margin-top:8px">
      📚 Save to MyCookbook
    </button>
    <div class="error" id="save-error"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const PROMPT = `You are a smart recipe assistant. Look at this photo of a recipe — it may be one or two pages of a recipe book, a magazine, a handwritten card, or any other format.

Extract the recipe and return a JSON object with these exact fields:

{
  "title": "Recipe name",
  "servings": 4,
  "ingredients": ["200g pasta", "1 onion", "400g canned tomatoes"],
  "skipped_staples": ["salt", "pepper", "olive oil"],
  "instructions": ["Boil the pasta for 10 minutes.", "Fry the onion until soft."]
}

Rules:
1. ingredients: include ONLY things someone needs to BUY. Always include quantities and units. Do NOT include everyday staples people already have at home — skip these into skipped_staples instead. Common staples to skip: salt, pepper, black pepper, olive oil, sunflower oil, vegetable oil, butter, water, plain flour, sugar, white sugar, brown sugar, vinegar, baking powder, baking soda, garlic (only if used as a basic seasoning).
2. skipped_staples: list every staple you left out.
3. Remove any footnote references, numbers or symbols from ingredient names (e.g. "Mayonnaise 3)" → "Mayonnaise", "Flour *" → "Flour").
4. instructions: one clear cooking step per item, in order. If steps span two pages, include all of them.
5. servings: how many people the recipe serves (integer). Estimate from quantities if not stated.
6. If the photo shows two pages, extract from both pages.
7. Return ONLY the JSON object. No markdown, no explanation, no code fences.`;

    const apiKeyInput = document.getElementById("api-key");
    const fileInput   = document.getElementById("file-input");
    const previewImg  = document.getElementById("preview-img");
    const scanBtn     = document.getElementById("scan-btn");
    const status      = document.getElementById("status");
    const errorMsg    = document.getElementById("error-msg");
    const result      = document.getElementById("result");
    const copyBtn     = document.getElementById("copy-btn");
    const saveBtn     = document.getElementById("save-btn");
    const saveError   = document.getElementById("save-error");
    const toastEl     = document.getElementById("toast");

    const MYCOOKBOOK_URL = "https://web-production-51557.up.railway.app";

    apiKeyInput.value = localStorage.getItem("anthropic_key") || "";
    apiKeyInput.addEventListener("change", () =>
      localStorage.setItem("anthropic_key", apiKeyInput.value.trim())
    );

    let imageBase64 = null;
    let lastIngredients = [];
    let lastRecipe = null;

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files[0];
      if (!file) return;
      errorMsg.textContent = "";
      result.style.display = "none";
      status.textContent = "Resizing image…";
      imageBase64 = await resizeImage(file);
      previewImg.src = "data:image/jpeg;base64," + imageBase64;
      previewImg.style.display = "block";
      scanBtn.disabled = false;
      status.textContent = "";
    });

    scanBtn.addEventListener("click", async () => {
      const key = apiKeyInput.value.trim();
      if (!key) { errorMsg.textContent = "Please enter your API key."; return; }
      if (!imageBase64) { errorMsg.textContent = "Please select a photo first."; return; }

      scanBtn.disabled = true;
      errorMsg.textContent = "";
      result.style.display = "none";
      status.textContent = "Reading recipe… (takes a few seconds)";

      try {
        const resp = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": key,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true",
          },
          body: JSON.stringify({
            model: "claude-haiku-4-5-20251001",
            max_tokens: 2048,
            messages: [{
              role: "user",
              content: [
                { type: "image", source: { type: "base64", media_type: "image/jpeg", data: imageBase64 } },
                { type: "text", text: PROMPT }
              ]
            }]
          })
        });

        const data = await resp.json();
        if (!resp.ok) {
          errorMsg.textContent = "API error: " + (data.error?.message || resp.status);
          return;
        }

        const raw = data.content[0].text.trim()
          .replace(/^```(?:json)?\n?/, "").replace(/\n?```$/, "").trim();
        const recipe = JSON.parse(raw);

        lastIngredients = recipe.ingredients || [];

        document.getElementById("servings-meta").textContent =
          recipe.servings ? `For ${recipe.servings} people` : "";

        document.getElementById("ingredients-list").innerHTML =
          lastIngredients.map(i => `<li>${escHtml(i)}</li>`).join("");

        const skipped = recipe.skipped_staples || [];
        document.getElementById("skipped-msg").textContent =
          skipped.length ? `Already assumed at home: ${skipped.join(", ")}` : "";

        document.getElementById("instructions-list").innerHTML =
          (recipe.instructions || []).map(s => `<li>${escHtml(s)}</li>`).join("");

        lastRecipe = recipe;
        saveError.textContent = "";
        result.style.display = "block";
        status.textContent = "";
        result.scrollIntoView({ behavior: "smooth" });
      } catch (err) {
        errorMsg.textContent = "Error: " + err.message;
        status.textContent = "";
      } finally {
        scanBtn.disabled = false;
      }
    });

    copyBtn.addEventListener("click", () => {
      if (!lastIngredients.length) return;
      const text = "🛒 Shopping list\n\n" + lastIngredients.map(i => "• " + i).join("\n");
      navigator.clipboard.writeText(text)
        .then(() => showToast("Copied to clipboard!"))
        .catch(() => {
          // Fallback for older iOS
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed"; ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.focus(); ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          showToast("Copied!");
        });
    });

    saveBtn.addEventListener("click", () => {
      if (!lastRecipe) return;
      const payload = {
        title: lastRecipe.title || "Scanned Recipe",
        description: "",
        image: "",
        ingredients: lastRecipe.ingredients || [],
        instructions: lastRecipe.instructions || [],
        prepTime: "",
        cookTime: "",
        servings: lastRecipe.servings || null,
        source_url: "",
        tags: [],
      };
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
      window.location.href = MYCOOKBOOK_URL + "/?import=" + encoded;
    });

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 2000);
    }

    function escHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function resizeImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          const MAX = 1200;
          let { width, height } = img;
          if (width > MAX || height > MAX) {
            if (width > height) { height = Math.round(height * MAX / width); width = MAX; }
            else { width = Math.round(width * MAX / height); height = MAX; }
          }
          const canvas = document.createElement("canvas");
          canvas.width = width; canvas.height = height;
          canvas.getContext("2d").drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL("image/jpeg", 0.85).split(",")[1]);
        };
        img.onerror = reject;
        img.src = url;
      });
    }
  </script>
</body>
</html>
